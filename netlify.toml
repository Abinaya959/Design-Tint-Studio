[build]
  command = "bun run build"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "20"

# The Nitro `netlify` preset (configured in vite.config.ts) emits the SSR
# function to `.netlify/functions-internal/` and static assets into
# `.output/public/` during `bun run build`. Netlify picks those up
# automatically — no extra redirects needed here.