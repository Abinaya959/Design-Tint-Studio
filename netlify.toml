[build]
  command = "bun run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# The Nitro `netlify` preset (configured in vite.config.ts) writes the SSR
# function to `.netlify/functions-internal/server/server.mjs` and static
# assets (plus `_redirects`) into `dist/`. Netlify auto-detects the
# internal function — no [functions] block or redirects needed here.