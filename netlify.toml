[build]
  command = "bun run build"
  publish = "dist/public"

# The Nitro `netlify` preset (configured in vite.config.ts) emits the SSR
# function to `.netlify/functions-internal/` and static assets + `_redirects`
# into `dist/public/` during `bun run build`. Netlify picks those up
# automatically — no extra redirects needed here.